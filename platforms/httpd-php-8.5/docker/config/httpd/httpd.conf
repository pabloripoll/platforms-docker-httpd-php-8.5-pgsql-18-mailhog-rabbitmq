ServerRoot "/etc/apache2"
Listen 80
PidFile /run/apache2/httpd.pid
ServerName localhost

# Note: On Alpine, modules are either loaded by default or must be loaded explicitly if present in /etc/apache2/modules.
# Avoid including missing or non-existent directories like conf.modules.d.
# Ensure unixd is loaded so User/Group directives work
# Path used on Alpine: /usr/lib/apache2/mod_unixd.so
LoadModule unixd_module /usr/lib/apache2/mod_unixd.so
LoadModule negotiation_module  /usr/lib/apache2/mod_negotiation.so
# Optional - you already load the event MPM explicitly below
LoadModule mpm_event_module /usr/lib/apache2/mod_mpm_event.so
# Ensure negotiation module is loaded so LanguagePriority and related directives work
LoadModule slotmem_shm_module /usr/lib/apache2/mod_slotmem_shm.so
# (other LoadModule lines — these must appear before Include conf.d)
LoadModule log_config_module  /usr/lib/apache2/mod_log_config.so
LoadModule authz_core_module  /usr/lib/apache2/mod_authz_core.so
# authz_host for Require ip ...
LoadModule authz_host_module  /usr/lib/apache2/mod_authz_host.so
LoadModule alias_module       /usr/lib/apache2/mod_alias.so
LoadModule rewrite_module     /usr/lib/apache2/mod_rewrite.so
LoadModule headers_module     /usr/lib/apache2/mod_headers.so
LoadModule proxy_module       /usr/lib/apache2/mod_proxy.so
LoadModule proxy_fcgi_module  /usr/lib/apache2/mod_proxy_fcgi.so
LoadModule expires_module     /usr/lib/apache2/mod_expires.so
LoadModule dir_module         /usr/lib/apache2/mod_dir.so
LoadModule mime_module        /usr/lib/apache2/mod_mime.so
# (optional) compat module if you still use Order/Allow/Deny
LoadModule access_compat_module /usr/lib/apache2/mod_access_compat.so
# See them all: $ sudo httpd -M

User myproj
Group myproj

# Note: On Alpine, modules are either loaded by default or must be loaded explicitly if present in /usr/lib/apache2.
IncludeOptional mods-enabled/*.load
IncludeOptional mods-enabled/*.conf

# Logging to container streams
ErrorLog /dev/stderr
CustomLog /dev/stdout combined

# Hardening
ServerTokens Prod
ServerSignature Off

# MIME types
TypesConfig /etc/apache2/mime.types

# Gzip compression
<IfModule deflate_module>
  AddOutputFilterByType DEFLATE text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript
</IfModule>

# Include all vhost configs
Include /etc/apache2/conf.d/*.conf

<Directory />
    AllowOverride none
    Require all denied
</Directory>

DocumentRoot "/var/www/"
<Directory "/var/www/">
    Options Indexes FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>